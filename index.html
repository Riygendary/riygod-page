<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riygod | Digital Space</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }
        
        /* 顶部紧凑 UI，不再遮挡中心 */
        #header-ui {
            position: absolute; top: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.7); border-bottom: 1px solid #0f0;
            padding: 10px 0; text-align: center; z-index: 100;
        }
        #header-ui h1 { color: #0f0; margin: 0; font-size: 18px; letter-spacing: 2px; }
        .links { margin-top: 5px; }
        a { color: #0f0; text-decoration: none; border: 1px solid #0f0; padding: 3px 8px; margin: 0 3px; font-size: 11px; display: inline-block; }
        
        #score-board { position: absolute; top: 70px; width: 100%; text-align: center; color: #0f0; font-size: 24px; font-weight: bold; pointer-events: none; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #fff; z-index: 50;
        }
    </style>
</head>
<body>

    <div id="header-ui">
        <h1>RIYGOD</h1>
        <div class="links">
            <a href="你的B站链接">BILIBILI</a>
            <a href="你的Github链接">GITHUB</a>
            <a href="#">QZONE</a>
        </div>
    </div>

    <div id="score-board">0</div>

    <div id="overlay" onclick="startGame()">
        <h2 id="msg-title">SPACE EXPLORER</h2>
        <p>点击屏幕开始跳跃</p>
    </div>

    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-board');
    const overlay = document.getElementById('overlay');
    const msgTitle = document.getElementById('msg-title');

    // 屏幕适配
    let W = window.innerWidth;
    let H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;

    let bird, pipes, score, frame, gameRunning = false;

    // 游戏参数调整
    const G = 0.5;
    const JUMP = -7;
    const PIPE_W = 60;
    const PIPE_SPEED = 3.5;
    const GAP = H * 0.22; // 开口大小为屏幕高度的 22%

    function init() {
        bird = { x: W * 0.2, y: H / 2, w: 25, h: 25, v: 0 };
        pipes = [];
        score = 0;
        frame = 0;
        scoreEl.innerText = score;
    }

    function startGame() {
        if (!gameRunning) {
            init();
            gameRunning = true;
            overlay.style.display = 'none';
            loop();
        }
    }

    function createPipe() {
        // 安全区域逻辑：开口必须在屏幕 20% 到 80% 之间
        let minSafeY = H * 0.15;
        let maxSafeY = H * 0.7;
        let h = Math.random() * (maxSafeY - minSafeY) + minSafeY;
        
        pipes.push({ x: W, y: 0, w: PIPE_W, h: h, passed: false });
        pipes.push({ x: W, y: h + GAP, w: PIPE_W, h: H - h - GAP });
    }

    function loop() {
        if (!gameRunning) return;

        ctx.clearRect(0, 0, W, H);

        // 小鸟逻辑
        bird.v += G;
        bird.y += bird.v;
        ctx.fillStyle = '#0f0';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#0f0';
        ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
        ctx.shadowBlur = 0;

        // 边界检测
        if (bird.y + bird.h > H || bird.y < 0) {
            endGame();
            return;
        }

        // 管道逻辑
        if (frame % 80 === 0) createPipe();

        for (let i = pipes.length - 1; i >= 0; i--) {
            let p = pipes[i];
            p.x -= PIPE_SPEED;

            // 绘制管道
            ctx.fillStyle = 'rgba(255, 20, 20, 0.8)';
            ctx.fillRect(p.x, p.y, p.w, p.h);

            // 碰撞检测
            if (bird.x < p.x + p.w && bird.x + bird.w > p.x && 
                bird.y < p.y + p.h && bird.y + bird.h > p.y) {
                endGame();
                return;
            }

            // 计分
            if (!p.passed && p.x + p.w < bird.x) {
                p.passed = true;
                if (i % 2 === 0) {
                    score++;
                    scoreEl.innerText = score;
                }
            }

            // 移除屏幕外管道
            if (p.x + p.w < 0) pipes.splice(i, 1);
        }

        frame++;
        requestAnimationFrame(loop);
    }

    function endGame() {
        gameRunning = false;
        msgTitle.innerText = "MISSION FAILED";
        overlay.style.display = 'flex';
    }

    // 输入监听
    const handleAction = (e) => {
        if (gameRunning) {
            bird.v = JUMP;
        }
        if (e.type === 'touchstart') e.preventDefault();
    };

    window.addEventListener('touchstart', handleAction, { passive: false });
    window.addEventListener('mousedown', handleAction);

    init(); // 初始显示
</script>
</body>
</html>
