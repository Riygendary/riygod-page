<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riygod | Digital Space</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft YaHei", sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }
        
        #header-ui {
            position: absolute; top: 0; left: 0; width: 100%;
            background: rgba(0, 15, 0, 0.9); border-bottom: 2px solid #0f0;
            padding: 10px 0; text-align: center; z-index: 300;
        }
        #header-ui h1 { color: #0f0; margin: 0; font-size: 20px; letter-spacing: 2px; }
        .links { margin-top: 8px; }
        a { 
            color: #0f0; text-decoration: none; border: 1px solid #0f0; 
            padding: 5px 12px; margin: 0 4px; font-size: 12px; 
            display: inline-block; border-radius: 4px; background: rgba(0, 255, 0, 0.05);
        }
        
        #score-container {
            position: absolute; top: 110px; width: 100%; text-align: center; 
            color: #0f0; pointer-events: none; z-index: 100;
        }
        #score-board { font-size: 50px; font-weight: bold; display: block; }
        #best-score-label { font-size: 14px; color: #008800; }

        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #fff; z-index: 200;
        }
        #overlay h2 { font-size: 32px; color: #0f0; margin-bottom: 10px; }
        .stats { margin-bottom: 20px; text-align: center; }
        .highlight { color: #0f0; font-weight: bold; font-size: 24px; }
        .btn-start { border: 2px solid #0f0; padding: 10px 25px; border-radius: 20px; color: #0f0; cursor: pointer; }
    </style>
</head>
<body>

    <div id="header-ui">
        <h1>RIYGOD</h1>
        <div class="links">
            <a href="https://space.bilibili.com/87180888" target="_blank">B站</a>
            <a href="https://github.com/Riygendary" target="_blank">GitHub</a>
            <a href="https://user.qzone.qq.com/2816935712" target="_blank">QQ空间</a>
        </div>
    </div>

    <div id="score-container">
        <span id="best-score-label">BEST: 0</span>
        <span id="score-board">0</span>
    </div>

    <div id="overlay">
        <h2 id="msg-title">SPACE EXPLORER</h2>
        <div class="stats" id="end-stats" style="display: none;">
            <p>SCORE: <span id="current-res" class="highlight">0</span></p>
            <p>RECORD: <span id="best-res" class="highlight">0</span></p>
        </div>
        <div class="btn-start">START MISSION</div>
    </div>

    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-board');
    const bestEl = document.getElementById('best-score-label');
    const overlay = document.getElementById('overlay');
    const endStats = document.getElementById('end-stats');

    // --- 核心物理参数调整 ---
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    
    // 电脑端调慢重力防止坠毁，手机端调快速度增加挑战
    const CONFIG = {
        G: isMobile ? 0.65 : 0.45,         // 重力：手机大，电脑小
        JUMP: isMobile ? -9 : -7.5,        // 跳跃力：匹配重力感
        SPEED: isMobile ? 4.2 : 3.2,       // 管道移动速度：手机快，电脑慢
        GAP: isMobile ? 160 : 200,         // 缺口大小：手机小，电脑大
        INTERVAL: isMobile ? 120 : 150     // 管道生成频率
    };

    let W, H, bird, pipes, score, frame, gameRunning = false;
    let highscore = localStorage.getItem('riygod_highscore') || 0;
    bestEl.innerText = `BEST: ${highscore}`;

    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;
    }

    function init() {
        bird = { x: W * 0.2, y: H / 2, w: 25, h: 25, v: 0 };
        pipes = [];
        score = 0;
        frame = 0;
        scoreEl.innerText = score;
        highscore = localStorage.getItem('riygod_highscore') || 0;
        bestEl.innerText = `BEST: ${highscore}`;
    }

    function startGame() {
        if (!gameRunning) {
            init();
            gameRunning = true;
            overlay.style.display = 'none';
            loop();
        }
    }

    function createPipe() {
        const gap = CONFIG.GAP; 
        const minH = H * 0.15;
        const maxH = H - gap - minH;
        let h = Math.random() * (maxH - minH) + minH;
        pipes.push({ x: W, y: 0, w: 50, h: h, passed: false });
        pipes.push({ x: W, y: h + gap, w: 50, h: H - h - gap });
    }

    function loop() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, W, H);

        bird.v += CONFIG.G;
        bird.y += bird.v;
        
        ctx.fillStyle = '#0f0';
        ctx.fillRect(bird.x, bird.y, bird.w, bird.h);

        if (bird.y + bird.h > H || bird.y < 0) return endGame();

        if (frame % CONFIG.INTERVAL === 0) createPipe();

        for (let i = pipes.length - 1; i >= 0; i--) {
            let p = pipes[i];
            p.x -= CONFIG.SPEED;
            
            ctx.strokeStyle = '#0f0';
            ctx.strokeRect(p.x, p.y, p.w, p.h);

            if (bird.x < p.x + p.w && bird.x + bird.w > p.x && bird.y < p.y + p.h && bird.y + bird.h > p.y) return endGame();

            if (!p.passed && p.x + p.w < bird.x) {
                p.passed = true;
                if (i % 2 === 0) {
                    score++;
                    scoreEl.innerText = score;
                }
            }
            if (p.x + p.w < 0) pipes.splice(i, 1);
        }
        frame++;
        requestAnimationFrame(loop);
    }

    function endGame() {
        gameRunning = false;
        if (score > highscore) {
            highscore = score;
            localStorage.setItem('riygod_highscore', highscore);
        }
        document.getElementById('msg-title').innerText = "MISSION FAILED";
        document.getElementById('current-res').innerText = score;
        document.getElementById('best-res').innerText = highscore;
        endStats.style.display = 'block';
        overlay.style.display = 'flex';
    }

    const handleAction = (e) => {
        if (e.target.closest('#header-ui') || e.target.closest('.btn-start')) return;
        if (gameRunning) bird.v = CONFIG.JUMP;
    };

    document.querySelector('.btn-start').addEventListener('click', startGame);
    window.addEventListener('touchstart', (e) => {
        handleAction(e);
        if (gameRunning) e.preventDefault();
    }, { passive: false });
    window.addEventListener('mousedown', handleAction);
    window.addEventListener('resize', resize);
    resize();
</script>
</body>
</html>
