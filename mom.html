<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给妈妈的惊喜 | DSR</title>
    <style>
        /* 背景升级：温馨的樱花粉渐变，铺满全屏 */
        body { 
            margin: 0; 
            min-height: 100vh;
            background: linear-gradient(135deg, #fff5f7 0%, #ffdde1 100%);
            font-family: "Microsoft YaHei", sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #333; 
            overflow-x: hidden;
            position: relative;
        }

        /* 背景装饰层 */
        #bg-decor {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;
        }

        /* 照片：加个更精致的框和微小的旋转角度 */
        .photo-frame {
            width: 300px; 
            margin-top: 50px; 
            border: 10px solid #fff;
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.15); 
            background: #fff;
            transition: transform 0.3s ease;
            transform: rotate(-1deg); /* 随意的艺术感 */
        }
        .photo-frame:hover { transform: rotate(0deg) scale(1.02); }
        .photo-frame img { width: 100%; display: block; }
        
        /* 祝福语：加个温馨的背景块和精细的边框 */
        .message-box {
            width: 85%; 
            max-width: 480px; 
            margin-top: 35px; 
            padding: 30px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            border: 1px solid rgba(255, 182, 193, 0.5);
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            line-height: 1.8; 
            font-size: 17px; 
            color: #444;
            animation: fadeIn 1.5s ease-out;
        }
        .signature { text-align: right; margin-top: 25px; color: #777; font-size: 14px; }
        .highlight { color: #d63384; font-weight: bold; }

        /* 🎁 “惊喜”按钮样式：金粉色，带有心跳脉动效果 */
        #surprise-btn {
            margin: 40px 0;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff99cc, #ff6699);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 102, 153, 0.4);
            transition: 0.3s;
            animation: pulse 2s infinite; /* 脉动效果引导点击 */
            z-index: 100;
        }
        #surprise-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(255, 102, 153, 0.6);
            animation: none; /* 悬停时停止脉动 */
        }

        /* 花束特效容器 */
        #flower-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* 动画定义 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 102, 153, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 102, 153, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 102, 153, 0); }
        }
    </style>
</head>
<body>

    <div id="bg-decor"></div>

    <div class="photo-frame">
        <img src="mom_photo.jpg.jpg" alt="妈妈的照片">
    </div>

    <div class="message-box">
        亲爱的妈妈：<br><br>
        
        在这个属于您的日子里，我想送给您这个小小的网页。<br><br>
        
        虽然它看起来很简单，但每一行代码都是我对您的想念和心意。<br><br>
        
        您辛苦了，希望您每天都开心，身体健康。<span class="highlight">妈妈，我爱您！</span>
        
        <div class="signature">
            —— 儿子：DSR<br>
            2026年5月7日
        </div>
    </div>

    <button id="surprise-btn">点击领取🎁惊喜</button>

    <canvas id="flower-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 998;"></canvas>

<script>
    // === 背景装饰特效 (温和飘落) ===
    const decorContainer = document.getElementById('bg-decor');
    const items = ['❤', '🌸'];
    function createDecor() {
        const item = document.createElement('div');
        item.innerHTML = items[Math.floor(Math.random() * items.length)];
        item.style.position = 'absolute';
        item.style.left = Math.random() * 100 + 'vw';
        item.style.top = '-30px';
        item.style.fontSize = (Math.random() * 15 + 10) + 'px';
        item.style.color = '#ffb3cc';
        item.style.opacity = Math.random() * 0.5;
        item.style.transition = 'transform 8s linear';
        decorContainer.appendChild(item);
        setTimeout(() => {
            item.style.transform = `translateY(${window.innerHeight + 50}px) rotate(${Math.random() * 360}deg)`;
        }, 100);
        setTimeout(() => item.remove(), 8000);
    }
    setInterval(createDecor, 600); // 平时温和地飘

    // === 花束爆发特效 (点击惊喜) ===
    const btn = document.getElementById('surprise-btn');
    const canvas = document.getElementById('flower-canvas');
    const ctx = canvas.getContext('2d');
    
    let W = window.innerWidth;
    let H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;

    const particles = [];
    // 🌸 康乃馨粒子形状的简单绘制方法
    const drawFlowerParticle = (p) => {
        ctx.beginPath();
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillStyle = p.color;
        // 绘制一个类似花瓣的形状
        for(let i = 0; i < 5; i++) {
            ctx.ellipse(0, 3, 4, 7, 0, 0, Math.PI * 2);
            ctx.rotate(Math.PI * 2 / 5);
        }
        ctx.fill();
        ctx.restore();
    };

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.r = Math.random() * 3 + 1;
            this.vx = (Math.random() - 0.5) * 15; // 爆发速度
            this.vy = (Math.random() - 0.7) * 20; 
            this.gy = 0.5; // 重力
            this.opacity = 1;
            this.rotation = Math.random() * Math.PI * 2;
            this.friction = 0.96; // 空气摩擦
        }
        update() {
            this.vx *= this.friction;
            this.vy *= this.friction;
            this.vy += this.gy;
            this.x += this.vx;
            this.y += this.vy;
            this.opacity -= 0.01;
            this.rotation += 0.05;
        }
    }

    function createExplosion(x, y) {
        // 金色和粉色的康乃馨配色
        const colors = ['#d63384', '#ff6699', '#ff99cc', '#ffd700', '#fff']; 
        for (let i = 0; i < 150; i++) { // 粒子数量
            particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
        }
    }

    function animate() {
        if (!particles.length) {
            ctx.clearRect(0, 0, W, H);
            return;
        }
        ctx.clearRect(0, 0, W, H);
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.update();
            if (p.opacity <= 0 || p.y > H) {
                particles.splice(i, 1);
                continue;
            }
            ctx.save();
            ctx.globalAlpha = p.opacity;
            drawFlowerParticle(p);
            ctx.restore();
        }
        requestAnimationFrame(animate);
    }

    btn.addEventListener('click', () => {
        // 1. 触发花束粒子爆发（从按钮中心爆发）
        const rect = btn.getBoundingClientRect();
        createExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2);
        
        // 2. 更改按钮文字和状态
        btn.innerText = "祝妈妈每天都开心！";
        btn.style.animation = 'none'; // 停止脉动
        btn.disabled = true; // 防止重复点击
        btn.style.background = '#ccc';
        btn.style.boxShadow = 'none';

        // 3. 启动特效画布
        animate();
    });

    window.addEventListener('resize', () => { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; });
</script>
</body>
</html>
