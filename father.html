<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>父亲节贺卡</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0e1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    overflow: hidden;
  }

  canvas#stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: min(680px, 92vw);
    background: linear-gradient(160deg, #111827 0%, #0d1525 60%, #0a1020 100%);
    border: 1px solid rgba(212, 175, 55, 0.25);
    border-radius: 4px;
    padding: 64px 60px 56px;
    box-shadow: 0 0 80px rgba(212, 175, 55, 0.06), 0 40px 80px rgba(0,0,0,0.6);
    text-align: center;
    animation: fadeUp 1.2s cubic-bezier(.22,.61,.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    background: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.07) 0%, transparent 65%);
    pointer-events: none;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: rgba(212, 175, 55, 0.55);
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .divider-top {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
  }

  .divider-top .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.3), transparent);
  }

  .divider-top .diamond {
    width: 6px;
    height: 6px;
    background: rgba(212,175,55,0.6);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .main-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(48px, 10vw, 72px);
    color: #d4af37;
    line-height: 1.1;
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(212,175,55,0.3);
    animation: glow 3s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 30px rgba(212,175,55,0.2); }
    to   { text-shadow: 0 0 60px rgba(212,175,55,0.45), 0 0 100px rgba(212,175,55,0.15); }
  }

  .sub-title {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: rgba(212, 175, 55, 0.45);
    margin-bottom: 48px;
  }

  .quote-block {
    position: relative;
    margin: 0 auto 40px;
    max-width: 480px;
    padding: 32px 36px;
    border-left: 2px solid rgba(212,175,55,0.35);
    text-align: left;
  }

  .quote-mark {
    position: absolute;
    top: 12px;
    left: -14px;
    width: 24px;
    height: 24px;
    background: #0d1525;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .quote-mark svg {
    width: 18px;
    height: 18px;
    fill: rgba(212,175,55,0.6);
  }

  .quote-text {
    font-size: 15px;
    line-height: 2;
    color: rgba(255,255,255,0.78);
    font-weight: 300;
  }

  .quote-text em {
    font-style: normal;
    color: #d4af37;
    font-weight: 400;
  }

  .blessing {
    font-size: 13.5px;
    line-height: 2.1;
    color: rgba(255,255,255,0.55);
    font-weight: 300;
    max-width: 420px;
    margin: 0 auto 48px;
    letter-spacing: 0.04em;
  }

  .divider-bottom {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 36px;
  }

  .divider-bottom .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  }

  .signature-area {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .sig-left {
    text-align: left;
  }

  .sig-date {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.25);
    margin-bottom: 4px;
  }

  .sig-from {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 22px;
    color: rgba(212,175,55,0.7);
  }

  .sig-right {
    text-align: right;
  }

  .mountain-icon svg {
    width: 48px;
    height: 32px;
    opacity: 0.25;
  }

  .corner-ornament {
    position: absolute;
    width: 32px;
    height: 32px;
    opacity: 0.35;
  }

  .corner-ornament.tl { top: 16px; left: 16px; }
  .corner-ornament.tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .corner-ornament.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
  .corner-ornament.br { bottom: 16px; right: 16px; transform: scale(-1); }

  .corner-ornament svg {
    width: 100%;
    height: 100%;
    fill: none;
    stroke: rgba(212,175,55,0.6);
    stroke-width: 1;
  }

  @media (max-width: 480px) {
    .card { padding: 48px 32px 40px; }
    .quote-block { padding: 24px 24px; }
    .signature-area { flex-direction: column; align-items: center; gap: 16px; }
    .sig-left, .sig-right { text-align: center; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="card">

  <svg class="corner-ornament tl" viewBox="0 0 32 32"><path d="M2 30 L2 2 L30 2"/><path d="M2 16 L8 10"/><path d="M16 2 L10 8"/></svg>
  <svg class="corner-ornament tr" viewBox="0 0 32 32"><path d="M2 30 L2 2 L30 2"/><path d="M2 16 L8 10"/><path d="M16 2 L10 8"/></svg>
  <svg class="corner-ornament bl" viewBox="0 0 32 32"><path d="M2 30 L2 2 L30 2"/><path d="M2 16 L8 10"/><path d="M16 2 L10 8"/></svg>
  <svg class="corner-ornament br" viewBox="0 0 32 32"><path d="M2 30 L2 2 L30 2"/><path d="M2 16 L8 10"/><path d="M16 2 L10 8"/></svg>

  <p class="eyebrow">Father's Day · 父亲节</p>

  <div class="divider-top">
    <div class="line"></div>
    <div class="diamond"></div>
    <div class="line"></div>
  </div>

  <h1 class="main-title">写给父亲</h1>
  <p class="sub-title">2026 · 六月</p>

  <div class="quote-block">
    <div class="quote-mark">
      <svg viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.293-3.995 5.848h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.293-3.996 5.848h3.983v10h-9.983z"/></svg>
    </div>
    <p class="quote-text">
      您的背影，是我<em>走过最长的路</em>。<br>
      您的沉默，是我听过<em>最深的告白</em>。<br>
      年少时，我以为山很高远——<br>
      后来才明白，<em>您就是那座山</em>。
    </p>
  </div>

  <p class="blessing">
    岁月无声，却从未停止在您额头留下痕迹。<br>
    谢谢您用一生，为我撑起了一片天空。<br>
    愿您身体康健，心中所念，皆得安然。<br>
    父亲节快乐。
  </p>

  <div class="divider-bottom">
    <div class="line"></div>
    <div class="diamond" style="width:4px;height:4px;background:rgba(255,255,255,0.15);transform:rotate(45deg);flex-shrink:0"></div>
    <div class="line"></div>
  </div>

  <div class="signature-area">
    <div class="sig-left">
      <p class="sig-date">写于 2026 年父亲节</p>
      <p class="sig-from">您的儿子DSR，敬上</p>
    </div>
    <div class="sig-right mountain-icon">
      <svg viewBox="0 0 64 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="32,4 56,36 8,36" fill="rgba(212,175,55,0.15)" stroke="rgba(212,175,55,0.5)" stroke-width="1.2" stroke-linejoin="round"/>
        <polygon points="48,14 62,36 34,36" fill="rgba(212,175,55,0.08)" stroke="rgba(212,175,55,0.3)" stroke-width="1" stroke-linejoin="round"/>
        <line x1="8" y1="36" x2="56" y2="36" stroke="rgba(212,175,55,0.2)" stroke-width="0.8"/>
      </svg>
    </div>
  </div>

</div>

<script>
(function() {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let W, H, particles;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    init();
  }

  function init() {
    particles = Array.from({ length: 160 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.003 + 0.001,
      phase: Math.random() * Math.PI * 2
    }));
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      const alpha = p.a * (0.5 + 0.5 * Math.sin(t * p.speed + p.phase));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(212, 175, 55, ${alpha * 0.8})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();
</script>

</body>
</html>
